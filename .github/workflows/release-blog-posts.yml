name: Release scheduled blog posts

# Runs daily at 13:00 UTC (9am ET / 6am PT). Reads scripts/blog-schedule.json,
# releases any posts whose date has arrived (strips noindex, adds to sitemap
# + news grid), commits the changes directly to main. Vercel redeploys
# automatically.
#
# Edit scripts/blog-schedule.json to change the publish dates.

on:
  schedule:
    - cron: '0 13 * * *'   # daily 13:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run release script
        run: node scripts/release-blog-posts.js

      - name: Commit if anything changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          if [[ -n "$(git status --porcelain)" ]]; then
            git add -A
            git commit -m "chore(blog): release scheduled posts ($(date -u +%Y-%m-%d))"
            git push
            echo "Pushed release."
          else
            echo "Nothing to release today."
          fi
